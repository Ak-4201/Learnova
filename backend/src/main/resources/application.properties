# Server (use 8080 if available, or set server.port=8081)
server.port=8081

# Aiven PostgreSQL - set SPRING_DATASOURCE_PASSWORD in env or local profile (never commit real password)
spring.datasource.url=jdbc:postgresql://learnova-learnovable.d.aivencloud.com:25682/defaultdb?sslmode=require
spring.datasource.username=avnadmin
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT (change in production)
learnova.jwt.secret=LearnovaLMSSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm
learnova.jwt.expiration-ms=86400000

# CORS handled in WebConfig
